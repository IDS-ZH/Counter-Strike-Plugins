// PRD CODEX configuration

// --- MVP ---
sm_prd_mvp_enable "1"                 // Включить выдачу награды MVP
sm_prd_mvp_amount "1000"
sm_prd_mvp_max_reward "0"             // 0 = следовать mp_maxmoney
sm_prd_mvp_bot_vote_proxy "1"         // Боты команды MVP автоматически голосуют "да"
sm_prd_mvp_native_vote_scale "1.0"    // Масштаб для PRD_RegisterMVPContribution

// --- Teamkill ---
sm_prd_teamkill_enable "1"

// --- Anti-camper ---
sm_prd_anticamper_enable "1"          // Включить анти-кампер
sm_anticamper_time "12.0"             // Время (сек) до статуса кампинга
sm_prd_anticamper_sound "1"           // Включить звук предупреждения
sm_prd_anticamper_sound_path "plugins/prd/heartbeat_loop.mp3"
sm_prd_anticamper_penalty_mode "1"    // 0=только предупреждение, 1=slap, 2=ignite
sm_prd_anticamper_penalty_amount "5"  // Сила slap/урон
sm_prd_anticamper_penalty_interval "3.0"
sm_prd_anticamper_ignite_duration "2.0"

// --- Rules ---
sm_prd_player_rules_file "configs/prd_rules_players.txt"
sm_prd_admin_rules_file "configs/prd_rules_admins.txt"
sm_prd_rules_interval "1"

// --- Punishments ---
sm_prd_punishments_file "configs/prd_punishments.cfg"
