// PRD CODEX configuration

// --- MVP ---
sm_prd_mvp_enable "1"                 // Enable MVP reward flow
sm_prd_mvp_amount "1000"              // Money per positive vote
sm_prd_mvp_max_reward "0"             // 0 = follow mp_maxmoney
sm_prd_mvp_bot_vote_proxy "1"         // Bots on MVP team auto-vote YES
sm_prd_mvp_native_vote_scale "1.0"    // Scale for PRD_RegisterMVPContribution

// --- Teamkill ---
sm_prd_teamkill_enable "1"            // Enable TK punishments
sm_teamkill_punish_mode "2"           // 0=off, 1=auto-punish, 2=victim menu
sm_teamkill_forgive_threshold "2"     // Victim TK count that auto-justifies revenge
sm_teamdamage_mutual_threshold "25"   // Mutual damage to consider aggression
sm_prd_bot_punishment "0"             // Punish bots for TK (0=disable)

// --- Anti-camper ---
sm_prd_anticamper_enable "1"          // Enable anti-camper
sm_anticamper_time "12.0"             // Seconds before marking camper
sm_prd_anticamper_sound "1"           // Play warning sound
sm_prd_anticamper_sound_path "plugins/prd/heartbeat_loop.mp3"
sm_prd_anticamper_penalty_mode "1"    // 0=warn, 1=slap, 2=ignite
sm_prd_anticamper_penalty_amount "5"  // Slap/ignite damage
sm_prd_anticamper_penalty_interval "3.0"
sm_prd_anticamper_ignite_duration "2.0"

// --- Rules ---
sm_prd_player_rules_file "configs/prd_rules_players.txt"
sm_prd_admin_rules_file "configs/prd_rules_admins.txt"
sm_prd_rules_interval "1"

// --- Punishments ---
sm_prd_punishments_file "configs/prd_punishments.cfg"
