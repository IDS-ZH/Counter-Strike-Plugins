// ====================================================================================================
// Explanation of Configuration Parameters:
//
// This file uses KeyValues format. Each main block (e.g., "FirstBlood", "Headshot") represents a game event.
//
// Inside each event block:
//
// "message"      - The translation key from "SoundManifest.phrases.txt" for the chat message.
//
// "audience"     - Who hears the sound and sees the message. Can be a single value or comma-separated.
//                  Valid options:
//                  "killer"      - Only the player who got the kill.
//                  "victim"      - Only the player who died.
//                  "killer_team" - The entire team of the killer.
//                  "victim_team" - The entire team of the victim.
//                  "all_alive"   - All living players on the server.
//                  "all"         - Everyone on the server.
//
// "sound_count"  - The number of sounds defined for this event. The plugin supports up to 5.
//                  The plugin will RANDOMLY play one of the sounds listed below.
//
// "sound_X"      - The path to the sound file.
//                  IMPORTANT: The path must be relative to the game's "sound/" directory.
//                  For example, if your sound is in "cstrike/sound/Plugins/SoundManifest/MySound.mp3",
//                  you must write "Plugins/SoundManifest/MySound.mp3".
//
// For the "JoinServer" event:
// You can create sub-blocks for different admin groups.
// - "Default" is for regular players with no admin flags.
// - For other groups (e.g., "Admins", "VIPs"), you must add a "flag" key with the required admin flag letter (e.g., "b", "o", "z").
// ====================================================================================================