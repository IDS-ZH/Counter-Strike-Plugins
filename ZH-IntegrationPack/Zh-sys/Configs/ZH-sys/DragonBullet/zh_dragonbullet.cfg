// ZH-sys Dragon Breath Bullet Configuration

// Enable/disable the Dragon Bullet plugin
zh_dragonbreath_enable "1"

// Which guns shoot dragon breath bullets (space separated)
zh_dragonbreath_guns "xm1014 m3"

// Fire damage on touch, per second (0.0 = no damage)
zh_dragonbreath_damage "5.0"

// Time in seconds for ignite player (requires enable)
zh_dragonbreath_ignite_time "4.0"

// Enable/Disable play sound when player was burned
zh_dragonbreath_playsound "1"

// Sound path relative to sound/ (avoid hardcoded paths in code)
zh_dragonbreath_sound "plugins/weapons_SFX/Flame/a-sudden-burst-of-fire.wav"
