// zh_hostages - hostage control
"zh_hostages"
{
	// Base HP for hostages (CS:S default 100).
	"hp"			"100"

	// Make hostages immortal. 1 = on (no damage), 0 = off.
	"immortal"		"0"

	// Enable hostage trail effect. 1 = on, 0 = off.
	"trail_enable"	"0"

	// Enable hostage beacon. 1 = on, 0 = off.
	"beacon_enable"	"0"
}
