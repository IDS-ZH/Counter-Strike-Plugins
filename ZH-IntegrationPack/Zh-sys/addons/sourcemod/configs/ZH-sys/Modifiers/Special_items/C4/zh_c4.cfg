// zh_c4 - C4 control for ZH-sys
// Values here are read by zh_c4 and friends; keep default gameplay values unless mode requires otherwise.

"zh_c4"
{
	// Base detonation timer (seconds). 35 = default CS:S.
	"bomb_timer"	"35"

	// Allow multiple C4 on a team? 0 = stock single bomb, 1 = allow extra C4 via give/buy.
	"allow_multi_bomb"	"0"

	// If multi_bomb is enabled, max extra bombs (per team).
	"multi_bomb_limit"	"1"

	// Announce plant site to humans/bots. 1 = enable chat/HUD hint, 0 = off.
	"announce_site"	"1"

	// Toggle DropBombDefuse helper (lets C4 be dropped/defuse kits drop). 1 = on, 0 = off.
	"enable_dropbombdefuse"	"0"

	// Defuse kit drop on death? 1 = drop, 0 = do not drop.
	"drop_defuse_on_death"	"1"
}
