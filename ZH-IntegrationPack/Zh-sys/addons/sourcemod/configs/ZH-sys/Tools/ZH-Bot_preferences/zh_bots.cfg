// zh_bots - bot integration
"zh_bots"
{
	// Assign MST classes to bots automatically. 1 = on, 0 = off.
	"assign_mst_classes"	"1"

	// Difficulty spread: 0 = все боты одинаковой сложности, 3 = полный диапазон 0-3.
	"difficulty_spread"	"1"

	// Preferred difficulty override: -1 keep server default, 0 easy, 1 normal, 2 hard, 3 expert.
	"difficulty_override"	"-1"

	// Sniper ratio: percent of bots allowed to take sniper class (0-100). -1 to disable.
	"sniper_percent"	"20"

	// Minimum snipers (per team) if sniper role is enabled. 0 = no minimum.
	"sniper_min"	"0"

	// Skill tweak for fast/accurate classes (multiplier to Skill/Aim, e.g. 1.10 = +10%).
	"class_skill_fast"	"1.10"

	// Penalty for heavy classes (multiplier to Skill/Aim, e.g. 0.85 = -15%).
	"class_skill_heavy"	"0.85"

	// Allow bots to use zh_modes role restrictions. 1 = enforce, 0 = ignore.
	"enforce_mode_roles"	"1"
}
