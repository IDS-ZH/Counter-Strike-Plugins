"zh_downloads"
{
	// Enable FastDL-based downloads. 1 = use sv_downloadurl, 0 = skip FastDL (direct only if allow_direct=1).
	"fastdl_enabled"      "1"
	// URL to FastDL root (no trailing slash). Replace with your CDN/HTTP host.
	"fastdl_url"          "http://fastdl.example.com/cstrike"  // No .bz2 here; store plain files mirroring server cstrike. Want bz2? prepare/upload yourself.
	// Allow direct server download fallback (slow). 1 = allow, 0 = disallow.
	"allow_direct"        "0"
	// Maximum file size (MB) to queue (safety). Empty = no limit.
	"max_file_size_mb"    "768"

	// Lists to include (relative paths). Master loader iterates these.
	"lists"
	{
		"mst_skins"   "configs/ZH-sys/MST/Downloads/skins_downloads.txt"
		"abilities"   "configs/ZH-sys/Tools/ZH-Downloader/Abilities/downloads.txt"
		"modes"       "configs/ZH-sys/Tools/ZH-Downloader/Modes/downloads.txt"
	}
}

